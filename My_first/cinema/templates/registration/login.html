{% extends 'cinema/base.html' %}

{% block title %}Вхід{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-body">
                <h1 class="h4 mb-3">Вхід у профіль</h1>

                {% if form.errors %}
                    <div class="alert alert-danger">Невірний логін або пароль.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Логін</label>
                        <input class="form-control" type="text" name="username" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">Пароль</label>
                        <input class="form-control" type="password" name="password" id="id_password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Увійти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
